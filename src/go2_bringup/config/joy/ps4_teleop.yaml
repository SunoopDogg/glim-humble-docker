# teleop_twist_joy configuration for PS4 controller (USB or Bluetooth)
# Axis indices (verify with: ros2 topic echo /joy)
#   0: left stick horizontal (+ = right)
#   1: left stick vertical   (+ = up/forward)
# Button indices:
#   4: L1 (deadman switch — hold to enable movement)
teleop_twist_joy:
  ros__parameters:
    axis_linear:
      x: 1          # left stick vertical → forward/backward
    axis_angular:
      yaw: 0        # left stick horizontal → turn
    scale_linear:
      x: 0.5        # max 0.5 m/s (safe mapping speed)
    scale_angular:
      yaw: 0.5      # max 0.5 rad/s
    enable_button: 4          # L1: must hold to move (deadman switch)
    enable_turbo_button: -1   # no turbo
