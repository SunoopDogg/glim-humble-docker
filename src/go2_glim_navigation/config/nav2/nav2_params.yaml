# Nav2 config for Go2 (differential/omni, circular footprint) on a GLIM map.
# Global costmap: static layer (exported OccupancyGrid). Local costmap: STVL on live /ouster/points.
# NOTE: Nav2 docs are master-era; param names verified against installed Humble in Task 10.
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /glim_ros/odom

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      motion_model_for_search: "DUBIN"
      minimum_turning_radius: 0.2
      allow_unknown: true
      tolerance: 0.25

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    # Explicit checkers (the defaults were used implicitly -> "No goal checker was
    # specified" WARN). SimpleProgressChecker measures LINEAR displacement only.
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      # Effectively ignore final heading: with use_rotate_to_heading:false RPP can't do a
      # final in-place spin to the goal yaw, so a tight tolerance made the robot circle the
      # goal forever chasing an orientation it can't snap to. pi rad accepts any yaw -> the
      # checker passes on xy alone. Tighten if a specific arrival heading is ever needed.
      yaw_goal_tolerance: 3.14
      stateful: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4
      max_angular_accel: 1.5
      lookahead_dist: 0.6
      use_collision_detection: true
      # Root-cause fix (2026-06-17): with rotate-to-heading ON (default), a goal not
      # roughly ahead made RPP spin in place first (linear.x=0) while SimpleProgressChecker
      # counts only LINEAR motion -> "Failed to make progress" abort. The SmacHybrid DUBIN
      # planner already emits a feasible forward arc from the current heading, so let RPP
      # follow it (turn WHILE driving): linear>0 from t=0 satisfies the checker AND keeps the
      # robot translating, which rko_lio (degraded 0-IMU constant-velocity mode) can track
      # far better than a degenerate in-place spin on the 32-beam LiDAR.
      use_rotate_to_heading: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.35
      plugins: ["stvl_layer", "inflation_layer"]
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        observation_sources: ouster
        ouster:
          data_type: PointCloud2
          topic: /ouster/points
          marking: true
          clearing: true
          obstacle_range: 8.0
          min_obstacle_height: 0.1
          max_obstacle_height: 1.5
          voxel_decay: 15.0
          decay_model: 0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # set at launch to the exported map (maps/glim_costmap.yaml)

behavior_server:
  ros__parameters:
    use_sim_time: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
