# Nav2 config for Go2 (differential/omni, circular footprint) on a GLIM map.
# Global costmap: static layer (exported OccupancyGrid). Local costmap: STVL on live /ouster/points.
# NOTE: Nav2 docs are master-era; param names verified against installed Humble in Task 10.
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /glim_ros/odom

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      motion_model_for_search: "DUBIN"
      minimum_turning_radius: 0.2
      allow_unknown: true
      tolerance: 0.25

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4
      max_angular_accel: 1.5
      lookahead_dist: 0.6
      use_collision_detection: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.35
      plugins: ["stvl_layer", "inflation_layer"]
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        observation_sources: ouster
        ouster:
          data_type: PointCloud2
          topic: /ouster/points
          marking: true
          clearing: true
          obstacle_range: 8.0
          min_obstacle_height: 0.1
          max_obstacle_height: 1.5
          voxel_decay: 15.0
          decay_model: 0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # set at launch to the exported map (maps/glim_costmap.yaml)

behavior_server:
  ros__parameters:
    use_sim_time: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
